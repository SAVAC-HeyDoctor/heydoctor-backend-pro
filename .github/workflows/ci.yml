# Comprobaciones previas a merge/release: deps, lint, build, tests.
# Bloqueo de merge: en GitHub → Settings → Branches → proteger `main`
# y marcar como requerido el check "CI / backend".

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: heydoctor-backend-pro

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: heydoctor-backend-pro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
