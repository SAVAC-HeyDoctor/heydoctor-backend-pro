# CI en paralelo: backend (Postgres + migraciones + E2E) y frontend (sin servicios extra).
# Branch protection: exigir checks «backend» y «frontend» (Settings → Branches → main).
# Slack opcional: secret SLACK_WEBHOOK_URL.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Nest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: heydoctor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/heydoctor_test
      JWT_SECRET: test_secret
      CI: 'true'

    defaults:
      run:
        working-directory: heydoctor-backend-pro

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: heydoctor-backend-pro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npm run migration:run

      - name: Seed E2E data
        run: node dist/database/seed.e2e.js

      - name: Test (unit)
        run: npm test

      - name: Run E2E tests
        run: DATABASE_E2E=1 npm run test:e2e
        env:
          E2E_SEED_APPLIED: 'true'
          INCIDENT_CORRELATION_REDIS: 'false'

  frontend:
    name: Frontend (Next)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  notify:
    name: CI alert (Slack opcional)
    needs: [backend, frontend]
    if: ${{ always() && (needs.backend.result != 'success' || needs.frontend.result != 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MSG_REF: ${{ github.ref }}
          MSG_ACTOR: ${{ github.actor }}
          MSG_REPO: ${{ github.repository }}
          MSG_RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "Sin SLACK_WEBHOOK_URL; no se envía alerta."
            exit 0
          fi
          BODY=$(jq -n \
            --arg text "🚨 CI failed in HeyDoctor — ${MSG_REPO} — ${MSG_REF} — actor: ${MSG_ACTOR} — ${MSG_RUN}" \
            '{text:$text}')
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$BODY"
