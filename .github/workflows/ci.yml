# Comprobaciones previas a merge/release: backend Nest + frontend Next.js.
# Bloqueo de merge (GitHub → Settings → Branches → main): marca requeridos
# "Backend (Nest)", "Frontend (Next)" y, si configuraste Slack, "CI alert".

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Nest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: heydoctor-backend-pro

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: heydoctor-backend-pro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long

  frontend:
    name: Frontend (Next)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  notify:
    name: CI alert (Slack opcional)
    needs: [backend, frontend]
    if: ${{ always() && (needs.backend.result == 'failure' || needs.frontend.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "Sin SLACK_WEBHOOK_URL; no se envía alerta."
            exit 0
          fi
          BODY=$(jq -n \
            --arg text "CI falló en ${{ github.repository }} (${{ github.ref_name }}) — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{text:$text}')
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$BODY"
