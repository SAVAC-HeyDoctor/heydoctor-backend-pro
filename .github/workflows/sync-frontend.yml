# Sincroniza `frontend/` → jairosc23/heydoctor-frontend al integrar en main.
#
# Secret GH_TOKEN: PAT (Settings → Developer settings → Personal access tokens) con scope `repo`,
# configurado como secret del repo: Settings → Secrets and variables → Actions → GH_TOKEN.
# El GITHUB_TOKEN del workflow no vale para hacer push a un repositorio externo.
#
# El job usa `continue-on-error: true` para que un fallo de sync no pinte todo el chequeo en rojo.
# Vercel: el push suele disparar Preview/Production según el proyecto enlazado.

name: Sync Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

concurrency:
  group: sync-frontend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check GH_TOKEN
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo '❌ GH_TOKEN not set'
            echo '::error::Define el repository secret GH_TOKEN (PAT con scope repo sobre jairosc23/heydoctor-frontend).'
            exit 1
          fi
          echo '✅ GH_TOKEN presente'

      - name: Checkout monorepo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & validate frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Git identity & jairo-fe remote
        run: |
          git config --global user.name 'heydoctor-bot'
          git config --global user.email 'bot@heydoctor.health'
          git remote remove jairo-fe 2>/dev/null || true
          git remote add jairo-fe "https://x-access-token:${GH_TOKEN}@github.com/jairosc23/heydoctor-frontend.git"
          git remote -v | sed 's/x-access-token:[^@]*@/x-access-token:***@/'

      - name: Sync to public frontend (squash-merge)
        env:
          SKIP_CHECK: '1'
        run: npm run sync:frontend:safe
