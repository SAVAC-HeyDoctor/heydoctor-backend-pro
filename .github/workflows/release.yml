# Crea un GitHub Release al publicar un tag SemVer v* (tag anotado recomendado).
# No altera Railway/Vercel; solo automatiza la nota de release en GitHub.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
