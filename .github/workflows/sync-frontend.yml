name: Sync Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

concurrency:
  group: sync-frontend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Debug context
        run: |
          echo "Branch: ${GITHUB_REF}"
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Commit: ${GITHUB_SHA}"
          echo "Event: ${{ github.event_name }}"

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # 🔥 CONFIGURA GIT SOLO SI HAY TOKEN
      - name: Setup Git remote
        if: env.GH_TOKEN != ''
        run: |
          git config --global user.name "heydoctor-bot"
          git config --global user.email "bot@heydoctor.health"

          git remote remove jairo-fe 2>/dev/null || true
          git remote add jairo-fe https://x-access-token:${GH_TOKEN}@github.com/jairosc23/heydoctor-frontend.git

          git remote -v | sed 's/x-access-token:[^@]*@/x-access-token:***@/'

      # 🚀 SYNC REAL
      - name: Push frontend to external repo
        if: env.GH_TOKEN != ''
        run: |
          echo "🚀 Syncing frontend..."
          git subtree push --prefix=frontend jairo-fe main

      # 🧠 SI NO HAY TOKEN → NO FALLA
      - name: Skip sync (no GH_TOKEN)
        if: env.GH_TOKEN == ''
        run: |
          echo "⚠️ GH_TOKEN no configurado → sync omitido"
